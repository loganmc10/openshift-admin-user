- name: Install python packages
  ansible.builtin.pip:
    name:
      - kubernetes
      - passlib

- name: Check for existing user
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: htpass-secret
    namespace: openshift-config
  register: admin_user_user
  until: admin_user_user is not failed

- name: Create user
  when: (admin_user_user.resources | length | int == 0) or (force is defined)
  block:
    - name: Create temporary file
      ansible.builtin.tempfile:
        state: file
      register: admin_user_tempfile

    - name: Create htpasswd file
      community.general.htpasswd:
        path: "{{ admin_user_tempfile.path }}"
        name: admin
        password: "{{ admin_password | default('admin') }}"
        mode: "0600"

    - name: Create secret
      kubernetes.core.k8s:
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: htpass-secret
            namespace: openshift-config
          type: Opaque
          data:
            htpasswd: "{{ lookup('ansible.builtin.file', admin_user_tempfile.path) | b64encode }}"
        apply: true
        force: true
        state: present
      register: admin_user_k8s_result
      until: admin_user_k8s_result is not failed

    - name: Remove temporary file
      ansible.builtin.file:
        path: "{{ admin_user_tempfile.path }}"
        state: absent

    - name: Update OAuth
      kubernetes.core.k8s:
        definition:
          apiVersion: config.openshift.io/v1
          kind: OAuth
          metadata:
            name: cluster
          spec:
            identityProviders:
              - name: my_htpasswd_provider
                mappingMethod: claim
                type: HTPasswd
                htpasswd:
                  fileData:
                    name: htpass-secret
        state: present
      register: admin_user_k8s_result
      until: admin_user_k8s_result is not failed

    - name: Create cluster-admins group
      kubernetes.core.k8s:
        definition:
          apiVersion: user.openshift.io/v1
          kind: Group
          metadata:
            name: cluster-admins
          users:
            - admin
        apply: true
        state: present
      register: admin_user_k8s_result
      until: admin_user_k8s_result is not failed

    - name: Grant cluster-admin
      kubernetes.core.k8s:
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: admin-cluster-admin
          subjects:
            - kind: Group
              name: cluster-admins
              apiGroup: rbac.authorization.k8s.io
          roleRef:
            kind: ClusterRole
            name: cluster-admin
            apiGroup: rbac.authorization.k8s.io
        apply: true
        state: present
      register: admin_user_k8s_result
      until: admin_user_k8s_result is not failed

- name: Remove kubeadmin user
  when: remove_kubeadmin | bool
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: kubeadmin
        namespace: kube-system
    state: absent
  register: admin_user_k8s_result
  until: admin_user_k8s_result is not failed
